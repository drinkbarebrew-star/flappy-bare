<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bare | Bare Brew</title>
<meta name="description" content="Flappy Bare — tap to fly the Bare Brew bear through a gauntlet of cold brew cans. How far can you go?">
<meta property="og:title" content="Flappy Bare | Bare Brew Cold Brew">
<meta property="og:description" content="Tap to fly the bear. Dodge the cans. Fuel your score. Play now.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🐻</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0604;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  #game-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 480px;
    max-height: 800px;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 0;
  }

  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #score-display {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: #F5B800;
    text-shadow: 0 4px 20px rgba(245, 184, 0, 0.5), 0 2px 0 #1F1108;
    letter-spacing: 4px;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #score-display.visible { opacity: 1; }

  .screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    pointer-events: auto;
    opacity: 0;
    transition: opacity 0.4s ease;
    padding: 20px;
  }

  .screen.visible { opacity: 1; }
  .screen.hidden { display: none; }

  #start-screen .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    color: #F5B800;
    text-shadow: 0 4px 30px rgba(245, 184, 0, 0.6), 0 3px 0 #4F2C1D;
    letter-spacing: 6px;
    line-height: 1;
  }

  #start-screen .sub-text {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #FFF8E7;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .bear-icon {
    font-size: 80px;
    animation: float 2s ease-in-out infinite;
    filter: drop-shadow(0 8px 24px rgba(245, 184, 0, 0.4));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .tap-prompt {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #FFC72C;
    animation: pulse 1.5s ease-in-out infinite;
    margin-top: 20px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  #game-over-screen {
    background: rgba(31, 17, 8, 0.92);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 40px 32px;
    border: 2px solid rgba(245, 184, 0, 0.3);
    box-shadow: 0 0 80px rgba(245, 184, 0, 0.15);
    max-width: 320px;
    width: 90%;
  }

  #game-over-screen .go-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: #ff6b5b;
    letter-spacing: 4px;
  }

  .score-row {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 12px 0;
    border-bottom: 1px solid rgba(245, 184, 0, 0.15);
  }

  .score-label {
    font-size: 14px;
    color: #FFF8E7;
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: #F5B800;
  }

  .btn {
    background: #F5B800;
    color: #1F1108;
    border: none;
    padding: 14px 40px;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    box-shadow: 0 4px 20px rgba(245, 184, 0, 0.4);
  }

  .btn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(245, 184, 0, 0.6); }
  .btn:active { transform: scale(0.97); }

  .share-btn {
    background: transparent;
    color: #FFC72C;
    border: 1.5px solid #FFC72C;
    padding: 10px 28px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: none;
  }

  .share-btn:hover { background: rgba(255, 199, 44, 0.1); }

  .branding {
    font-size: 11px;
    color: #FFF8E7;
    opacity: 0.35;
    letter-spacing: 1.5px;
    margin-top: 8px;
  }

  .branding a { color: #F5B800; text-decoration: none; }
  .branding a:hover { text-decoration: underline; }

  .new-best { color: #ff6b5b; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

  @media (max-height: 600px) {
    #start-screen .logo-text { font-size: 48px; }
    .bear-icon { font-size: 56px; }
    #score-display { font-size: 56px; top: 24px; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="game"></canvas>

  <div id="score-display">0</div>

  <div id="ui-overlay">
    <!-- START SCREEN -->
    <div id="start-screen" class="screen visible">
      <div class="bear-icon">🐻</div>
      <div class="logo-text">FLAPPY BARE</div>
      <div class="sub-text">A Bare Brew Game</div>
      <div class="tap-prompt">TAP TO FLY</div>
      <div class="branding">320mg · 2 Ingredients · Zero BS<br><a href="https://drinkbarebrew.com" target="_blank">drinkbarebrew.com</a></div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="screen hidden">
      <div class="go-title">GAME OVER</div>
      <div class="score-row">
        <span class="score-label">Score</span>
        <span class="score-value" id="final-score">0</span>
      </div>
      <div class="score-row">
        <span class="score-label">Best</span>
        <span class="score-value" id="best-score">0</span>
      </div>
      <div id="new-best-tag" class="new-best" style="display:none;">★ NEW BEST ★</div>
      <button class="btn" id="retry-btn">TRY AGAIN</button>
      <button class="share-btn" id="share-btn">SHARE SCORE</button>
      <div class="branding">Fueled by <a href="https://drinkbarebrew.com" target="_blank">Bare Brew</a></div>
    </div>
  </div>
</div>

<script>
// ─── GAME ENGINE ─────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// UI refs
const scoreDisplay = document.getElementById('score-display');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const finalScoreEl = document.getElementById('final-score');
const bestScoreEl = document.getElementById('best-score');
const newBestTag = document.getElementById('new-best-tag');
const retryBtn = document.getElementById('retry-btn');
const shareBtn = document.getElementById('share-btn');

// ─── CONSTANTS ───────────────────────────────────────────
const COLORS = {
  sky1: '#1a0e06',
  sky2: '#2c1a0a',
  sky3: '#3d2410',
  gold: '#F5B800',
  brightGold: '#FFC72C',
  darkBrown: '#1F1108',
  medBrown: '#4F2C1D',
  cream: '#FFF8E7',
  can: '#D4A017',
  canDark: '#8B6914',
  canHighlight: '#ffe566',
  coral: '#ff6b5b',
  ground: '#0d0805',
};

const GRAVITY = 0.45;
const FLAP_FORCE = -7.5;
const PIPE_WIDTH = 64;
const PIPE_GAP = 160;
const PIPE_SPEED = 2.8;
const PIPE_SPAWN_INTERVAL = 1600;
const BEAR_SIZE = 36;

// ─── STATE ───────────────────────────────────────────────
let W, H, dpr;
let state = 'start'; // start | playing | dead
let bear, pipes, score, bestScore, particles, screenShake;
let lastPipeSpawn, animFrame;
let groundOffset = 0;

bestScore = parseInt(localStorage.getItem('flappyBareBest') || '0');

function resize() {
  const wrapper = document.getElementById('game-wrapper');
  const rect = wrapper.getBoundingClientRect();
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

window.addEventListener('resize', resize);
resize();

// ─── BEAR DRAWING ────────────────────────────────────────
function drawBear(x, y, rotation, flapPhase) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);

  // Body
  const bodyGrad = ctx.createRadialGradient(0, 0, 4, 0, 0, BEAR_SIZE * 0.48);
  bodyGrad.addColorStop(0, '#c8923a');
  bodyGrad.addColorStop(0.6, '#8B6914');
  bodyGrad.addColorStop(1, '#5a4410');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, BEAR_SIZE * 0.44, BEAR_SIZE * 0.48, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  const headY = -BEAR_SIZE * 0.38;
  ctx.fillStyle = '#a07828';
  ctx.beginPath();
  ctx.arc(0, headY, BEAR_SIZE * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  ctx.arc(-BEAR_SIZE * 0.22, headY - BEAR_SIZE * 0.24, BEAR_SIZE * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(BEAR_SIZE * 0.22, headY - BEAR_SIZE * 0.24, BEAR_SIZE * 0.12, 0, Math.PI * 2);
  ctx.fill();

  // Inner ears
  ctx.fillStyle = '#c8923a';
  ctx.beginPath();
  ctx.arc(-BEAR_SIZE * 0.22, headY - BEAR_SIZE * 0.24, BEAR_SIZE * 0.07, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(BEAR_SIZE * 0.22, headY - BEAR_SIZE * 0.24, BEAR_SIZE * 0.07, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = '#d4a850';
  ctx.beginPath();
  ctx.ellipse(0, headY + BEAR_SIZE * 0.08, BEAR_SIZE * 0.15, BEAR_SIZE * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#2c1a0a';
  ctx.beginPath();
  ctx.ellipse(0, headY + BEAR_SIZE * 0.02, BEAR_SIZE * 0.06, BEAR_SIZE * 0.04, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#1F1108';
  ctx.beginPath();
  ctx.arc(-BEAR_SIZE * 0.1, headY - BEAR_SIZE * 0.06, BEAR_SIZE * 0.045, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(BEAR_SIZE * 0.1, headY - BEAR_SIZE * 0.06, BEAR_SIZE * 0.045, 0, Math.PI * 2);
  ctx.fill();

  // Eye shine
  ctx.fillStyle = '#FFF8E7';
  ctx.beginPath();
  ctx.arc(-BEAR_SIZE * 0.08, headY - BEAR_SIZE * 0.08, BEAR_SIZE * 0.018, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(BEAR_SIZE * 0.12, headY - BEAR_SIZE * 0.08, BEAR_SIZE * 0.018, 0, Math.PI * 2);
  ctx.fill();

  // Wings
  const wingAngle = Math.sin(flapPhase) * 0.5;
  ctx.save();
  ctx.translate(-BEAR_SIZE * 0.36, -BEAR_SIZE * 0.05);
  ctx.rotate(-0.3 + wingAngle);
  ctx.fillStyle = '#a07828';
  ctx.beginPath();
  ctx.ellipse(0, 0, BEAR_SIZE * 0.22, BEAR_SIZE * 0.1, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(BEAR_SIZE * 0.36, -BEAR_SIZE * 0.05);
  ctx.rotate(0.3 - wingAngle);
  ctx.fillStyle = '#a07828';
  ctx.beginPath();
  ctx.ellipse(0, 0, BEAR_SIZE * 0.22, BEAR_SIZE * 0.1, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Belly patch (golden like Bare Brew)
  ctx.fillStyle = COLORS.gold;
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.ellipse(0, BEAR_SIZE * 0.12, BEAR_SIZE * 0.2, BEAR_SIZE * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ─── CAN PIPE DRAWING ───────────────────────────────────
function drawCan(x, y, w, h, flip) {
  ctx.save();
  if (flip) {
    ctx.translate(x, y + h);
    ctx.scale(1, -1);
  } else {
    ctx.translate(x, y);
  }

  // Can body
  const canGrad = ctx.createLinearGradient(0, 0, w, 0);
  canGrad.addColorStop(0, '#9a7520');
  canGrad.addColorStop(0.3, COLORS.gold);
  canGrad.addColorStop(0.5, COLORS.canHighlight);
  canGrad.addColorStop(0.7, COLORS.gold);
  canGrad.addColorStop(1, '#9a7520');
  ctx.fillStyle = canGrad;

  // Rounded rect body
  const r = 8;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(w - r, 0);
  ctx.quadraticCurveTo(w, 0, w, r);
  ctx.lineTo(w, h - r);
  ctx.quadraticCurveTo(w, h, w - r, h);
  ctx.lineTo(r, h);
  ctx.quadraticCurveTo(0, h, 0, h - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();

  // Lip at open end
  ctx.fillStyle = '#c8a030';
  ctx.fillRect(-4, h - 12, w + 8, 14);
  ctx.fillStyle = COLORS.canHighlight;
  ctx.fillRect(-4, h - 12, w + 8, 3);

  // Dark band
  ctx.fillStyle = COLORS.darkBrown;
  ctx.fillRect(0, h * 0.55, w, h * 0.15);

  // "BB" text on can
  ctx.fillStyle = COLORS.darkBrown;
  ctx.font = `bold ${Math.min(w * 0.35, 20)}px 'Bebas Neue', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BB', w / 2, h * 0.35);

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(w * 0.15, 4, w * 0.15, h - 16);

  ctx.restore();
}

// ─── PARTICLES ───────────────────────────────────────────
function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 4,
      color: color || COLORS.gold,
    });
  }
}

function spawnScoreParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i;
    particles.push({
      x, y,
      vx: Math.cos(angle) * 3,
      vy: Math.sin(angle) * 3,
      life: 1,
      decay: 0.025,
      size: 3,
      color: COLORS.brightGold,
    });
  }
}

// ─── BACKGROUND ──────────────────────────────────────────
function drawBackground() {
  // Gradient sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#0d0805');
  skyGrad.addColorStop(0.4, '#1a0e06');
  skyGrad.addColorStop(0.7, '#2c1a0a');
  skyGrad.addColorStop(1, '#3d2410');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255, 248, 231, 0.15)';
  const seed = 42;
  for (let i = 0; i < 40; i++) {
    const sx = ((seed * (i + 1) * 7) % 1000) / 1000 * W;
    const sy = ((seed * (i + 1) * 13) % 1000) / 1000 * H * 0.6;
    const ss = ((seed * (i + 1) * 3) % 100) / 100 * 2 + 0.5;
    ctx.beginPath();
    ctx.arc(sx, sy, ss, 0, Math.PI * 2);
    ctx.fill();
  }

  // Distant city silhouette
  ctx.fillStyle = '#150c06';
  const buildings = [
    [0, 0.72, 0.06], [0.06, 0.65, 0.04], [0.1, 0.7, 0.05],
    [0.15, 0.58, 0.035], [0.185, 0.68, 0.06], [0.245, 0.62, 0.04],
    [0.285, 0.74, 0.05], [0.335, 0.55, 0.03], [0.365, 0.66, 0.06],
    [0.425, 0.72, 0.04], [0.465, 0.6, 0.05], [0.515, 0.68, 0.035],
    [0.55, 0.75, 0.06], [0.61, 0.64, 0.04], [0.65, 0.7, 0.05],
    [0.7, 0.56, 0.03], [0.73, 0.67, 0.06], [0.79, 0.73, 0.04],
    [0.83, 0.62, 0.05], [0.88, 0.69, 0.04], [0.92, 0.74, 0.05],
    [0.97, 0.66, 0.04],
  ];
  buildings.forEach(([xp, yp, wp]) => {
    ctx.fillRect(xp * W, yp * H, wp * W + 2, H);
  });

  // Ground
  ctx.fillStyle = COLORS.ground;
  ctx.fillRect(0, H - 50, W, 50);

  // Ground line
  ctx.strokeStyle = COLORS.medBrown;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H - 50);
  ctx.lineTo(W, H - 50);
  ctx.stroke();

  // Ground hash marks (scrolling)
  ctx.strokeStyle = 'rgba(79, 44, 29, 0.3)';
  ctx.lineWidth = 1;
  for (let gx = -groundOffset % 24; gx < W; gx += 24) {
    ctx.beginPath();
    ctx.moveTo(gx, H - 50);
    ctx.lineTo(gx - 8, H - 38);
    ctx.stroke();
  }
}

// ─── INIT ────────────────────────────────────────────────
function initGame() {
  bear = {
    x: W * 0.25,
    y: H * 0.45,
    vy: 0,
    rotation: 0,
    flapPhase: 0,
    flapSpeed: 0,
  };
  pipes = [];
  particles = [];
  score = 0;
  screenShake = 0;
  lastPipeSpawn = 0;
  groundOffset = 0;
  scoreDisplay.textContent = '0';
}

// ─── FLAP ────────────────────────────────────────────────
function flap() {
  if (state === 'start') {
    state = 'playing';
    startScreen.classList.remove('visible');
    setTimeout(() => startScreen.classList.add('hidden'), 400);
    scoreDisplay.classList.add('visible');
    initGame();
    bear.vy = FLAP_FORCE;
    bear.flapSpeed = 12;
    requestAnimationFrame(loop);
    return;
  }
  if (state === 'playing') {
    bear.vy = FLAP_FORCE;
    bear.flapSpeed = 12;
    spawnParticles(bear.x - 10, bear.y + 15, 3, 'rgba(255, 199, 44, 0.6)');
  }
}

// ─── COLLISION ───────────────────────────────────────────
function checkCollision() {
  const bx = bear.x, by = bear.y;
  const br = BEAR_SIZE * 0.35;

  // Ground / ceiling
  if (by + br > H - 50 || by - br < 0) return true;

  // Pipes
  for (const pipe of pipes) {
    const px = pipe.x, pw = PIPE_WIDTH;
    // Horizontal overlap
    if (bx + br > px && bx - br < px + pw) {
      // Top pipe
      if (by - br < pipe.topH) return true;
      // Bottom pipe
      if (by + br > pipe.topH + PIPE_GAP) return true;
    }
  }
  return false;
}

// ─── DIE ─────────────────────────────────────────────────
function die() {
  state = 'dead';
  screenShake = 12;
  spawnParticles(bear.x, bear.y, 20, COLORS.coral);
  spawnParticles(bear.x, bear.y, 12, COLORS.gold);

  const isNewBest = score > bestScore;
  if (isNewBest) {
    bestScore = score;
    localStorage.setItem('flappyBareBest', bestScore);
  }

  setTimeout(() => {
    finalScoreEl.textContent = score;
    bestScoreEl.textContent = bestScore;
    newBestTag.style.display = isNewBest ? 'block' : 'none';
    gameOverScreen.classList.remove('hidden');
    setTimeout(() => gameOverScreen.classList.add('visible'), 50);
  }, 600);
}

// ─── LOOP ────────────────────────────────────────────────
let lastTime = 0;

function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min(timestamp - lastTime, 32);
  lastTime = timestamp;

  if (state === 'dead' && screenShake <= 0 && particles.length === 0) return;

  // Shake
  ctx.save();
  if (screenShake > 0) {
    const sx = (Math.random() - 0.5) * screenShake;
    const sy = (Math.random() - 0.5) * screenShake;
    ctx.translate(sx, sy);
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  // ─ Background
  drawBackground();

  if (state === 'playing') {
    groundOffset += PIPE_SPEED;

    // ─ Bear physics
    bear.vy += GRAVITY;
    bear.y += bear.vy;
    bear.rotation = Math.max(-0.5, Math.min(bear.vy * 0.06, 1.2));
    bear.flapPhase += bear.flapSpeed * 0.1;
    bear.flapSpeed *= 0.92;
    if (bear.flapSpeed < 0.5) bear.flapSpeed = 2;

    // ─ Pipes
    const now = timestamp;
    if (now - lastPipeSpawn > PIPE_SPAWN_INTERVAL || pipes.length === 0) {
      const minTop = 80;
      const maxTop = H - 50 - PIPE_GAP - 80;
      const topH = minTop + Math.random() * (maxTop - minTop);
      pipes.push({ x: W + 20, topH, scored: false });
      lastPipeSpawn = now;
    }

    for (let i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= PIPE_SPEED;

      // Score
      if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < bear.x) {
        pipes[i].scored = true;
        score++;
        scoreDisplay.textContent = score;
        spawnScoreParticles(bear.x, bear.y - BEAR_SIZE);
      }

      // Remove offscreen
      if (pipes[i].x + PIPE_WIDTH < -20) {
        pipes.splice(i, 1);
      }
    }

    // ─ Collision
    if (checkCollision()) {
      die();
    }
  }

  // ─ Draw pipes
  for (const pipe of pipes) {
    // Top can (flipped)
    drawCan(pipe.x, 0, PIPE_WIDTH, pipe.topH, true);
    // Bottom can
    const botY = pipe.topH + PIPE_GAP;
    const botH = H - 50 - botY;
    drawCan(pipe.x, botY, PIPE_WIDTH, botH, false);
  }

  // ─ Draw bear
  if (bear) {
    drawBear(bear.x, bear.y, bear.rotation || 0, bear.flapPhase || 0);
  }

  // ─ Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ─ Dead bear fall
  if (state === 'dead' && bear) {
    bear.vy += GRAVITY;
    bear.y += bear.vy;
    bear.rotation += 0.08;
    if (bear.y > H + 100) bear = null;
  }

  ctx.restore();

  if (state !== 'start') {
    animFrame = requestAnimationFrame(loop);
  }
}

// ─── IDLE ANIMATION (start screen) ──────────────────────
function idleLoop() {
  if (state !== 'start') return;
  drawBackground();

  // Draw a floating bear in center
  const t = Date.now() / 1000;
  const idleY = H * 0.45 + Math.sin(t * 2) * 12;
  drawBear(W * 0.5, idleY, Math.sin(t * 3) * 0.08, t * 4);

  requestAnimationFrame(idleLoop);
}

// ─── INPUT ───────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    flap();
  }
});

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  flap();
});

retryBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  gameOverScreen.classList.remove('visible');
  setTimeout(() => {
    gameOverScreen.classList.add('hidden');
    state = 'playing';
    initGame();
    bear.vy = FLAP_FORCE;
    bear.flapSpeed = 12;
    lastTime = 0;
    requestAnimationFrame(loop);
  }, 300);
});

shareBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const text = `🐻 I scored ${score} in Flappy Bare! ☕\n320mg of pure game fuel.\nCan you beat me? → drinkbarebrew.com/play`;
  if (navigator.share) {
    navigator.share({ title: 'Flappy Bare', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      shareBtn.textContent = 'COPIED!';
      setTimeout(() => shareBtn.textContent = 'SHARE SCORE', 2000);
    });
  }
});

// ─── BOOT ────────────────────────────────────────────────
initGame();
idleLoop();
</script>
